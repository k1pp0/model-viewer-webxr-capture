extends:
  - eslint:recommended
  - google
  - plugin:@typescript-eslint/eslint-recommended
  - plugin:@typescript-eslint/recommended
  - plugin:wc/recommended
globals:
  goog: false
env:
  browser: true
parser: "@typescript-eslint/parser"
plugins:
  - "@typescript-eslint"
  - mocha
  - wc
parserOptions:
  ecmaVersion: 2017
  sourceType: module
settings:
  wc:
    elementBaseClasses: ["BaseElement", "LitElement", "FormElement"]
rules:
  # Rules temporally disabled
  "@typescript-eslint/explicit-function-return-type": off

  # Rules disabled in favor of clang-format
  "@typescript-eslint/indent": off
  indent: off
  max-len: off
  block-spacing: off
  object-curly-spacing: off
  # Remove if we switch away from clang-format:
  keyword-spacing: off

  # clang-format wants async(foo) => {} without a space
  space-before-function-paren: off

  "@typescript-eslint/explicit-member-accessibility": [error, {"accessibility": "no-public"}]

  no-new: warn
  quotes: [error, single, {"avoidEscape": true}]
  no-var: error
  curly: error
  no-floating-decimal: error
  # tsc handles this for us, and eslint has false positives
  no-unused-vars: error
  "@typescript-eslint/no-unused-vars": off

  require-jsdoc: off
  valid-jsdoc: off

  prefer-const: error
  comma-dangle: off

  mocha/handle-done-callback: error
  mocha/no-exclusive-tests: error
  mocha/no-identical-title: error
  mocha/no-nested-tests: error
  mocha/no-pending-tests: error
  mocha/no-skipped-tests: error
  # this.classList is used intentionally for CSS-driven animation state
  wc/no-self-class: off
overrides:
  - files: ["src/**/*.ts"]
    rules:
      no-unused-vars: off
      no-invalid-this: off
      new-cap: off
  - files: ["src/**/*.ts"]
    rules:
      "@typescript-eslint/no-non-null-assertion": off
  - files: ["src/test/**/*.ts"]
    rules:
      # Chai property assertions (e.g. .to.exist) look like unused expressions
      "@typescript-eslint/no-unused-expressions": off
