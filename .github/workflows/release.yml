name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz
            dist/model-viewer-webxr-capture.min.js
            dist/model-viewer-webxr-capture.min.js.map
            dist/model-viewer-webxr-capture-bundled.min.js
            dist/model-viewer-webxr-capture-bundled.min.js.map
            dist/model-viewer-webxr-capture.d.ts
