name: Unit tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: NPM install
        run: npm ci
      - name: Install playwright browsers
        run: npx playwright install --with-deps
      - name: Build
        run: npm run build
      - name: Unit tests
        run: npm run test:ci
